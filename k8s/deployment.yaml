apiVersion: apps/v1
kind: Deployment

metadata:
  name: readmission-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: readmission-api

  template:
    metadata:
      labels:
        app: readmission-api

    spec:
      containers:
      - name: readmission-api

        image: IMAGE_PLACEHOLDER

        ports:
        - containerPort: 8000