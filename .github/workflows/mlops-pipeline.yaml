name: Azure MLOps Full Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install azure-ai-ml azure-identity

      - name: Train and register model in Azure ML
        env:
          GITHUB_SHA: ${{ github.sha }}
          ACR_NAME: ${{ secrets.ACR_NAME }}
        run: |
          python run_training_and_register.py

      - name: Commit updated model metadata
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add model_config.json release_metadata.json
          git commit -m "update model metadata from Azure ML training" || echo "No metadata changes"
          git push

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }} \
          .

      - name: Push Docker image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
          --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }} \
          --overwrite-existing

      - name: Create ACR image pull secret
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ secrets.ACR_NAME }}.azurecr.io \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --namespace default \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          IMAGE=${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }}
          sed "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml > k8s/deployment-rendered.yaml
          kubectl apply -f k8s/deployment-rendered.yaml
          kubectl apply -f k8s/service.yaml
      
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/readmission-api --timeout=180s
      
      - name: Verify AKS deployment
        run: |
          kubectl get pods -o wide
          kubectl get svc readmission-api-service
          kubectl get endpoints readmission-api-service
      
      - name: Test API inside AKS
        run: |
          kubectl run curl-test \
            --image=curlimages/curl \
            --restart=Never \
            --rm -i \
            -- curl -v http://readmission-api-service.default.svc.cluster.local:8000/health
      