name: Azure MLOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }} \
          .

      - name: Push Docker image
        run: |
          docker push \
          ${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }}

      - name: Show image pushed
        run: |
          echo "Image pushed:"
          echo "${{ secrets.ACR_NAME }}.azurecr.io/hospital-readmission-api:${{ github.sha }}"